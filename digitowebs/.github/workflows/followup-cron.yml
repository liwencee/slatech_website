name: Daily Client Follow-up

on:
  schedule:
    # Runs every day at 06:00 UTC (≈ 07:00 Lagos time)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  trigger-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Call follow-up endpoint
        run: |
          curl -sf "https://slatech.com.ng/api/followup-cron?key=${{ secrets.CRON_SECRET }}"
