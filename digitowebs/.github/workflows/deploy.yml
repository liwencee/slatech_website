name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH Deploy to slatech.com.ng
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            # Navigate to project folder on the server
            cd ${{ secrets.PROJECT_PATH }}

            # Pull latest code from GitHub
            git pull origin main

            # Move into the Next.js app folder
            cd digitowebs

            # Install dependencies (skip devDeps in production)
            npm ci --omit=dev

            # Build the Next.js app
            npm run build

            # Restart the Node.js app via PM2 (Hostinger uses PM2)
            pm2 restart slatech --update-env || pm2 start npm --name slatech -- start

            echo "✅ Deployment complete"
